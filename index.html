<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Next Match</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #fafafa;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card {
    text-align: center;
    padding: 40px;
  }
  .team {
    font-size: 6vw;
    font-weight: 600;
    letter-spacing: -1px;
  }
  .vs {
    font-size: 2.5vw;
    color: #999;
    margin: 10px 0;
  }
  .opponent {
    font-size: 6vw;
    font-weight: 600;
    margin-bottom: 30px;
  }
  .datetime {
    font-size: 3vw;
    font-weight: 500;
  }
  .venue {
    font-size: 2vw;
    color: #666;
    margin-top: 8px;
  }
  .status {
    font-size: 2vw;
    color: #999;
  }
  .updated {
    position: fixed;
    bottom: 10px;
    right: 16px;
    font-size: 0.8vw;
    color: #ccc;
  }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="status">Loading…</div>
</div>
<div class="updated" id="updated"></div>

<script>
const WORKER_URL = "https://wc-display.lcbuea5.workers.dev";
const REFRESH_MS = 60 * 60 * 1000; // 1 hour

function formatDateTime(utcDate) {
  const d = new Date(utcDate);
  const dateStr = d.toLocaleDateString(undefined, {
    weekday: "long", day: "numeric", month: "long"
  });
  const timeStr = d.toLocaleTimeString(undefined, {
    hour: "2-digit", minute: "2-digit"
  });
  return `${dateStr} · ${timeStr}`;
}

function render(team, match) {
  const card = document.getElementById("card");
  if (!match) {
    card.innerHTML = `<div class="status">No upcoming match found</div>`;
    return;
  }
  const home = match.isHome ? team : match.opponent;
  const away = match.isHome ? match.opponent : team;
  card.innerHTML = `
    <div class="team">${home}</div>
    <div class="vs">vs</div>
    <div class="opponent">${away}</div>
    <div class="datetime">${formatDateTime(match.utcDate)}</div>
    ${match.venue ? `<div class="venue">${match.venue}</div>` : ""}
  `;
}

async function loadNextMatch() {
  try {
    const res = await fetch(WORKER_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const valid = (data.results || [])
      .filter(r => r.match)
      .map(r => ({ team: r.team, match: r.match }));

    const errors = (data.results || [])
      .filter(r => r.error)
      .map(r => `${r.team}: ${r.error}`);

    if (valid.length === 0) {
      const card = document.getElementById("card");
      card.innerHTML = `<div class="status">No upcoming match found</div>` +
        (errors.length ? `<div class="venue" style="margin-top:20px;color:#c00">${errors.join("<br>")}</div>` : "");
      return;
    }

    valid.sort((a, b) => new Date(a.match.utcDate) - new Date(b.match.utcDate));
    render(valid[0].team, valid[0].match);
  } catch (e) {
    document.getElementById("card").innerHTML =
      `<div class="status">Error loading match data</div><div class="venue">${e.message}</div>`;
    console.error(e);
  } finally {
    document.getElementById("updated").textContent =
      "Updated " + new Date().toLocaleTimeString();
  }
}

loadNextMatch();
setInterval(loadNextMatch, REFRESH_MS);
</script>

</body>
</html>
